# Network Monitor - Configuration
# 局域网设备监测工具配置

monitor:
  # Web dashboard port
  web_port: 5206

  # CLI watch mode scan interval (seconds)
  scan_interval: 60

  # Ping timeout per device (seconds)
  ping_timeout: 2

  # Max parallel ping workers
  max_workers: 50

  # Auto-scan on web startup
  auto_scan: true

  # History retention (days, 0 = keep forever)
  history_retention_days: 30

# Network configuration
network:
  # Override network CIDR (e.g. "192.168.1.0/24")
  # Leave empty for auto-detection
  cidr: ""

# Device aliases - give friendly names to known devices
aliases:
  # "xx:xx:xx:xx:xx:xx": "My Device Name"
